<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline P2P File Share</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { text-align: center; color: #333; }
        textarea { width: 95%; height: 80px; margin: 10px 0; padding: 8px; border-radius: 4px; border: 1px solid #ccc; resize: none; }
        button { width: 100%; padding: 10px; margin: 5px 0; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0056b3; }
        .status { font-weight: bold; color: green; margin: 10px 0; text-align: center; }
        .box { border: 1px dashed #bbb; padding: 15px; margin: 15px 0; background: #fafafa; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Offline File Sharer</h2>
    <div id="status" class="status">Status: Not Connected</div>

    <!-- Step 1: Connection Setup -->
    <div class="box">
        <h3>1. Connection Setup</h3>
        <button id="createOffer">Device 1: Generate Code</button>
        <textarea id="localCode" placeholder="Aapka connection code yahan aayega..." readonly></textarea>
        
        <textarea id="remoteCode" placeholder="Dusre device ka code yahan paste karein..."></textarea>
        <button id="connectBtn">Connect </button>
    </div>

    <!-- Step 2: File Sharing -->
    <div class="box">
        <h3>2. Share File</h3>
        <input type="file" id="fileInput" disabled>
        <button id="sendFile" disabled style="background: #28a745;">Send File</button>
    </div>
</div>

<script>
    const peerConnection = new RTCPeerConnection();
    let dataChannel;

    // Device 1: Creates the connection offer
    document.getElementById('createOffer').addEventListener('click', async () => {
        dataChannel = peerConnection.createDataChannel("fileTransfer");
        setupDataChannel(dataChannel);

        peerConnection.onicecandidate = e => {
            if (!e.candidate) {
                document.getElementById('localCode').value = btoa(JSON.stringify(peerConnection.localDescription));
            }
        };

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
    });

    // Handle incoming connections (Device 2)
    peerConnection.ondatachannel = e => {
        setupDataChannel(e.channel);
    };

    // Connect button logic
    document.getElementById('connectBtn').addEventListener('click', async () => {
        const remoteCodeValue = document.getElementById('remoteCode').value.trim();
        if (!remoteCodeValue) return alert("Please paste the code first!");

        const remoteDesc = JSON.parse(atob(remoteCodeValue));

        if (remoteDesc.type === "offer") {
            await peerConnection.setRemoteDescription(remoteDesc);
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            peerConnection.onicecandidate = e => {
                if (!e.candidate) {
                    document.getElementById('localCode').value = btoa(JSON.stringify(peerConnection.localDescription));
                    alert("Ab is naye code ko Device 1 mein paste karein!");
                }
            };
        } else if (remoteDesc.type === "answer") {
            await peerConnection.setRemoteDescription(remoteDesc);
        }
    });

    function setupDataChannel(channel) {
        channel.onopen = () => {
            document.getElementById('status').innerText = "Status: Connected! ";
            document.getElementById('fileInput').disabled = false;
            document.getElementById('sendFile').disabled = false;
        };

        let receivedChunks = [];
        channel.onmessage = e => {
            if (e.data === "END") {
                const blob = new Blob(receivedChunks);
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "shared_file";
                a.click();
                receivedChunks = [];
                alert("File received and downloaded!");
            } else {
                receivedChunks.push(e.data);
            }
        };
    }

    // File Sending Logic
    document.getElementById('sendFile').addEventListener('click', () => {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return alert("Please select a file!");

        const reader = new FileReader();
        reader.onload = e => {
            const buffer = e.target.result;
            const chunkSize = 16384; // 16KB chunks
            let offset = 0;

            while (offset < buffer.byteLength) {
                const chunk = buffer.slice(offset, offset + chunkSize);
                if (dataChannel && dataChannel.readyState === "open") {
                    dataChannel.send(chunk);
                }
                offset += chunkSize;
            }
            dataChannel.send("END");
            alert("File sent successfully!");
        };
        reader.readAsArrayBuffer(file);
    });
</script>

</body>
</html>
