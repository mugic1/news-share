<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyStream</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#000000" />
    <script src="https://unpkg.com/lucide@latest">
    </script>
    <script src="https://www.youtube.com/iframe_api">
    </script>

    <style>
        /* ─── CORE STYLES ─── */
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #1e293b;
            --text-sec: #64748b;
            --radius: 14px;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            --transition: 0.25s ease;
        }

        /* Dark theme (auto + manual) */
        [data-theme="dark"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --text-main: #f1f5f9;
            --text-sec: #94a3b8;
        }
        [data-theme="light"] {
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #1e293b;
            --text-sec: #64748b;
        }
        /* Auto theme: use prefers-color-scheme */
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]):not([data-theme="dark"]) {
                --bg: #0f172a;
                --surface: #1e293b;
                --text-main: #f1f5f9;
                --text-sec: #94a3b8;
            }
        }
        @media (prefers-color-scheme: light) {
            :root:not([data-theme="light"]):not([data-theme="dark"]) {
                --bg: #f8fafc;
                --surface: #ffffff;
                --text-main: #1e293b;
                --text-sec: #64748b;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            padding-bottom: 80px;
            transition: background var(--transition), color var(--transition);
        }

        .hidden {
            display: none !important;
        }
        .fade-in {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ─── NAVBAR ─── */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--surface);
            border-bottom: 1px solid rgba(0, 0, 0, 0.07);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
            backdrop-filter: blur(6px);
            transition: background var(--transition), border-color var(--transition);
        }
        .logo {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-add {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 24px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .btn-add:active {
            transform: scale(0.96);
        }

        /* ─── CONTAINER ─── */
        .container {
            max-width: 820px;
            margin: 72px auto 0;
            padding: 0 16px 20px;
        }

        /* ─── DAILY PROGRESS CARD ─── */
        .daily-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px 20px 18px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px;
            transition: background var(--transition), border var(--transition);
        }
        .daily-left {
            flex: 1 1 180px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .daily-left .streak {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .daily-left .streak span {
            color: var(--text-sec);
            font-weight: 400;
            font-size: 0.9rem;
        }
        .daily-left .time-label {
            font-size: 0.9rem;
            color: var(--text-sec);
        }
        .daily-left .time-label strong {
            color: var(--text-main);
        }

        .daily-mid {
            flex: 2 1 200px;
            min-width: 120px;
        }
        .progress-track {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 99px;
            overflow: hidden;
            margin: 6px 0 4px;
        }
        .progress-track .fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 99px;
            transition: width 0.4s ease;
            width: 0%;
        }
        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-sec);
        }

        .daily-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            margin-left: auto;
        }
        .daily-right .msg {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--primary);
            text-align: right;
            max-width: 180px;
        }
        .daily-right .btn-goal {
            background: none;
            border: 1px solid #d1d5db;
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.7rem;
            color: var(--text-sec);
            cursor: pointer;
            transition: 0.15s;
        }
        .daily-right .btn-goal:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ─── DASHBOARD GRID ─── */
        .dash-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }
        .dash-card {
            background: var(--surface);
            padding: 16px 10px;
            border-radius: var(--radius);
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, background var(--transition);
        }
        .dash-card:active {
            transform: scale(0.96);
        }
        .dash-card h3 {
            font-size: 0.9rem;
            margin-top: 4px;
            text-transform: capitalize;
        }
        .dash-card small {
            color: var(--text-sec);
            font-size: 0.75rem;
        }
        .dash-card .count-badge {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            border-radius: 99px;
            padding: 0 10px;
            font-size: 0.7rem;
            font-weight: 600;
            line-height: 20px;
            margin-top: 4px;
        }

        /* ─── VIDEO CARD ─── */
        .video-card {
            background: var(--surface);
            border-radius: var(--radius);
            margin-bottom: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            transition: opacity 0.2s, background var(--transition);
        }
        .video-card.completed {
            opacity: 0.55;
            filter: grayscale(0.6);
        }
        .thumb-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #0a0a0a;
            cursor: pointer;
            overflow: hidden;
        }
        .thumb-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.92);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #111;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
            transition: transform 0.15s;
        }
        .thumb-box:hover .play-icon {
            transform: translate(-50%, -50%) scale(1.05);
        }
        .progress-bar {
            height: 4px;
            background: #e2e8f0;
            width: 100%;
        }
        .progress-bar .fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }

        .card-meta {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .v-info {
            flex: 1;
            min-width: 0;
        }
        .v-info .v-cat {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--text-sec);
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        .v-info h3 {
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .v-info .v-status {
            font-size: 0.7rem;
            color: var(--text-sec);
            margin-top: 2px;
        }
        .v-info .v-status .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
        }
        .v-info .v-status .dot.in-progress {
            background: #eab308;
        }
        .v-info .v-status .dot.completed {
            background: #22c55e;
        }
        .v-info .v-status .dot.new {
            background: #3b82f6;
        }

        .card-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .card-actions button {
            background: none;
            border: none;
            color: var(--text-sec);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: background 0.15s, color 0.15s;
        }
        .card-actions button:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
        .card-actions .btn-resume {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .card-actions .btn-resume:active {
            transform: scale(0.94);
        }

        /* ─── PLAYER OVERLAY ─── */
        .player-overlay {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .player-overlay .player-controls {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 10px;
            z-index: 1001;
        }
        .player-overlay .player-controls .ctrl-btn {
            color: #fff;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.15s;
        }
        .player-overlay .player-controls .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }
        .player-overlay .player-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            padding: 6px 18px;
            border-radius: 99px;
            z-index: 1001;
            display: flex;
            align-items: center;
            gap: 14px;
            white-space: nowrap;
        }
        .player-overlay .player-info .p-progress {
            color: #fff;
            font-weight: 600;
        }
        .video-wrapper {
            width: 100%;
            max-width: 960px;
            aspect-ratio: 16/9;
            background: #000;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
        }
        .video-wrapper #player-container {
            width: 100%;
            height: 100%;
        }

        /* ─── MODAL ─── */
        .modal-wrap {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-box {
            background: var(--surface);
            width: 100%;
            max-width: 420px;
            padding: 24px 22px;
            border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-height: 90vh;
            overflow-y: auto;
            transition: background var(--transition);
        }
        .modal-box h3 {
            font-size: 1.1rem;
            margin-bottom: 12px;
        }
        .modal-box .input-area {
            width: 100%;
            height: 100px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 10px;
            margin: 10px 0 14px;
            background: var(--bg);
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
        }
        .modal-box .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }
        .modal-box .modal-actions .btn-primary {
            flex: 1;
            background: var(--primary);
            color: #fff;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .modal-box .modal-actions .btn-primary:active {
            transform: scale(0.96);
        }
        .modal-box .modal-actions .btn-secondary {
            padding: 10px 18px;
            border: none;
            background: #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-main);
        }
        .cat-picker {
            display: flex;
            gap: 8px;
            margin: 12px 0 6px;
            flex-wrap: wrap;
        }
        .cat-picker button {
            flex: 1;
            min-width: 60px;
            padding: 8px 4px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: transparent;
            color: var(--text-main);
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: capitalize;
            cursor: pointer;
            transition: 0.15s;
        }
        .cat-picker button.active {
            background: #e0e7ff;
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ─── TIMER TAB ─── */
        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px 0;
        }
        .timer-mode-tabs {
            display: flex;
            gap: 12px;
            background: var(--surface);
            padding: 6px;
            border-radius: 99px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .timer-mode-tabs button {
            background: none;
            border: none;
            padding: 8px 20px;
            border-radius: 99px;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-sec);
            cursor: pointer;
            transition: all 0.2s;
        }
        .timer-mode-tabs button.active {
            background: var(--primary);
            color: #fff;
        }

        .timer-display {
            font-size: 4.5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: 2px;
            background: var(--surface);
            padding: 20px 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.05);
            min-width: 200px;
            text-align: center;
            transition: background var(--transition);
        }
        .timer-display .label {
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text-sec);
            display: block;
            margin-top: 4px;
        }

        .timer-controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .timer-controls button {
            padding: 10px 24px;
            border: none;
            border-radius: 99px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: transform 0.15s, background 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .timer-controls button:active {
            transform: scale(0.94);
        }
        .timer-controls .btn-start {
            background: var(--primary);
            color: #fff;
        }
        .timer-controls .btn-pause {
            background: #facc15;
            color: #1e293b;
        }
        .timer-controls .btn-reset {
            background: #e2e8f0;
            color: var(--text-main);
        }
        .timer-controls .btn-skip {
            background: #94a3b8;
            color: #fff;
        }

        .timer-stats {
            display: flex;
            gap: 30px;
            background: var(--surface);
            padding: 16px 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .timer-stats .stat {
            text-align: center;
        }
        .timer-stats .stat .num {
            font-size: 1.6rem;
            font-weight: 700;
        }
        .timer-stats .stat .lbl {
            font-size: 0.7rem;
            color: var(--text-sec);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .timer-settings {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            background: var(--surface);
            padding: 16px 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.05);
            margin-top: 10px;
        }
        .timer-settings label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-sec);
        }
        .timer-settings input {
            width: 60px;
            padding: 4px 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background: var(--bg);
            color: var(--text-main);
            font-size: 0.85rem;
            text-align: center;
        }
        .timer-settings input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ─── BOTTOM NAV ─── */
        .btm-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: var(--surface);
            border-top: 1px solid rgba(0, 0, 0, 0.07);
            display: flex;
            justify-content: space-around;
            align-items: center;
            backdrop-filter: blur(6px);
            z-index: 50;
            transition: background var(--transition), border var(--transition);
        }
        .btm-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.6rem;
            color: var(--text-sec);
            gap: 2px;
            cursor: pointer;
            padding: 4px 12px;
            transition: color 0.15s;
            position: relative;
        }
        .btm-btn.active {
            color: var(--primary);
        }
        .btm-btn .badge-dot {
            position: absolute;
            top: 0;
            right: 4px;
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            border: 2px solid var(--surface);
        }

        /* ─── MISC ─── */
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .empty-state {
            color: var(--text-sec);
            padding: 20px 0;
            text-align: center;
            font-size: 0.9rem;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .mt-4 {
            margin-top: 16px;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 480px) {
            .daily-card {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .daily-right {
                align-items: flex-start;
                margin-left: 0;
            }
            .daily-right .msg {
                text-align: left;
                max-width: 100%;
            }
            .dash-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
            .dash-card {
                padding: 12px 6px;
            }
            .dash-card h3 {
                font-size: 0.75rem;
            }
            .player-overlay .player-info {
                font-size: 0.65rem;
                padding: 4px 12px;
                gap: 10px;
                bottom: 12px;
                white-space: normal;
                flex-wrap: wrap;
                justify-content: center;
            }
            .video-wrapper {
                border-radius: 4px;
            }
            .timer-display {
                font-size: 3.5rem;
                padding: 16px 24px;
            }
            .timer-stats {
                gap: 16px;
                padding: 12px 20px;
            }
        }

        @media (min-width: 768px) {
            .btm-nav {
                display: none !important;
            }
            body {
                padding-bottom: 0;
            }
        }
    </style>
</head>
<body>

    <div id="app"></div>

    <script>
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  APP STATE
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const STATE_KEY = 'studyStreamDB';
        const DAILY_KEY = 'studyStreamDaily';
        const TIMER_KEY = 'studyStreamTimer';
        const THEME_KEY = 'studyStreamTheme';

        const app = {
            data: {
                tab: 'home',
                videos: [],
                modalOpen: false,
                addCat: 'physics',
                goalModal: false,
                goalInput: 30,
                theme: 'auto',
            },

            daily: {
                dailyGoal: 30,
                streak: 0,
                todayWatchSeconds: 0,
                todayDate: '',
                lastActiveDate: '',
                lastStreakDate: '',
            },

            timer: {
                mode: 'pomodoro',
                pomodoro: {
                    workDuration: 25,
                    breakDuration: 5,
                    remaining: 25 * 60,
                    state: 'idle', // idle, running, paused
                    isBreak: false,
                    sessionsCompleted: 0,
                    timerInterval: null,
                },
                stopwatch: {
                    elapsed: 0,
                    running: false,
                    timerInterval: null,
                },
            },

            player: {
                instance: null,
                sessionStart: 0,
                sessionSeconds: 0,
                timerInterval: null,
                isTracking: false,
                currentVideoId: null,
            },

            // ─── Init ───
            init() {
                this.loadState();
                this.loadDaily();
                this.loadTimer();
                this.loadTheme();
                this.applyTheme();
                this.checkDayReset();
                this.render();

                document.addEventListener('visibilitychange', () => {
                    if (document.hidden) {
                        this.saveDaily();
                        this.saveTimer();
                    }
                });

                setInterval(() => {
                    this.saveDaily();
                    this.saveTimer();
                }, 30000);

                window.addEventListener('beforeunload', () => {
                    this.saveTimer();
                });
            },

            // ─── State IO ───
            loadState() {
                const saved = localStorage.getItem(STATE_KEY);
                if (saved) {
                    try { this.data.videos = JSON.parse(saved); } catch (_) {}
                }
            },

            saveState() {
                localStorage.setItem(STATE_KEY, JSON.stringify(this.data.videos));
                this.render();
            },

            loadDaily() {
                const raw = localStorage.getItem(DAILY_KEY);
                if (raw) {
                    try {
                        const d = JSON.parse(raw);
                        Object.assign(this.daily, d);
                    } catch (_) {}
                }
                if (!this.daily.todayDate) {
                    this.daily.todayDate = this.getToday();
                }
                if (!this.daily.dailyGoal) this.daily.dailyGoal = 30;
            },

            saveDaily() {
                localStorage.setItem(DAILY_KEY, JSON.stringify(this.daily));
            },

            loadTimer() {
                const raw = localStorage.getItem(TIMER_KEY);
                if (raw) {
                    try {
                        const t = JSON.parse(raw);
                        if (t.mode) this.timer.mode = t.mode;
                        if (t.pomodoro) {
                            const p = t.pomodoro;
                            // Keep intervals null
                            p.timerInterval = null;
                            // Ensure remaining is set
                            if (p.remaining === undefined) p.remaining = p.workDuration * 60;
                            Object.assign(this.timer.pomodoro, p);
                            // If state was running, restart interval
                            if (this.timer.pomodoro.state === 'running') {
                                this.startPomodoroInterval();
                            }
                        }
                        if (t.stopwatch) {
                            const sw = t.stopwatch;
                            sw.timerInterval = null;
                            Object.assign(this.timer.stopwatch, sw);
                            if (this.timer.stopwatch.running) {
                                this.startStopwatchInterval();
                            }
                        }
                    } catch (_) {}
                }
            },

            saveTimer() {
                const toSave = {
                    mode: this.timer.mode,
                    pomodoro: { ...this.timer.pomodoro, timerInterval: null },
                    stopwatch: { ...this.timer.stopwatch, timerInterval: null },
                };
                localStorage.setItem(TIMER_KEY, JSON.stringify(toSave));
            },

            loadTheme() {
                const saved = localStorage.getItem(THEME_KEY);
                if (saved) this.data.theme = saved;
            },

            saveTheme() {
                localStorage.setItem(THEME_KEY, this.data.theme);
                this.applyTheme();
            },

            applyTheme() {
                const root = document.documentElement;
                if (this.data.theme === 'auto') {
                    root.removeAttribute('data-theme');
                } else {
                    root.setAttribute('data-theme', this.data.theme);
                }
            },

            toggleTheme() {
                const modes = ['auto', 'light', 'dark'];
                const idx = modes.indexOf(this.data.theme);
                this.data.theme = modes[(idx + 1) % modes.length];
                this.saveTheme();
            },

            getToday() {
                return new Date().toISOString().slice(0, 10);
            },

            checkDayReset() {
                const today = this.getToday();
                if (this.daily.todayDate !== today) {
                    const goalSec = this.daily.dailyGoal * 60;
                    if (this.daily.todayWatchSeconds >= goalSec) {
                        this.daily.streak += 1;
                        this.daily.lastStreakDate = this.daily.todayDate;
                    } else {
                        if (this.daily.todayWatchSeconds > 0) {
                            this.daily.streak = 0;
                        }
                    }
                    this.daily.todayWatchSeconds = 0;
                    this.daily.todayDate = today;
                    this.daily.lastActiveDate = today;
                    this.saveDaily();
                }
            },

            addWatchTime(seconds) {
                if (seconds <= 0) return;
                this.daily.todayWatchSeconds += seconds;
                this.daily.lastActiveDate = this.getToday();
                this.saveDaily();
                if (this.data.tab === 'home' || this.data.tab === 'timer') this.render();
            },

            getDailyProgress() {
                const goalSec = this.daily.dailyGoal * 60;
                const watched = Math.min(this.daily.todayWatchSeconds, goalSec);
                return {
                    watchedSec: watched,
                    goalSec: goalSec,
                    percent: goalSec > 0 ? (watched / goalSec) * 100 : 0,
                    isComplete: watched >= goalSec,
                    remainingSec: Math.max(0, goalSec - watched),
                    watchedMin: Math.floor(watched / 60),
                    goalMin: this.daily.dailyGoal,
                };
            },

            setGoal(minutes) {
                if (minutes < 1) minutes = 1;
                if (minutes > 480) minutes = 480;
                this.daily.dailyGoal = minutes;
                this.saveDaily();
                this.data.goalModal = false;
                this.render();
            },

            setTab(t) {
                if (this.data.tab === 'timer' && t !== 'timer') {
                    this.saveTimer();
                }
                this.data.tab = t;
                this.render();
                window.scrollTo(0, 0);
            },

            toggleModal(v) {
                this.data.modalOpen = v;
                if (!v) document.getElementById('linkBox') && (document.getElementById('linkBox').value = '');
                this.render();
            },

            toggleGoalModal(v) {
                this.data.goalModal = v;
                if (v) this.goalInput = this.daily.dailyGoal;
                this.render();
            },

            setCat(c) {
                this.data.addCat = c;
                this.render();
            },

            addVideos() {
                const input = document.getElementById('linkBox');
                if (!input) return;
                const text = input.value;
                const matches = text.matchAll(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([\w-]{11})/g);
                const ids = new Set([...matches].map(m => m[1]));

                if (ids.size === 0) {
                    alert('No valid YouTube links found!');
                    return;
                }

                let added = 0;
                ids.forEach(id => {
                    if (!this.data.videos.find(v => v.id === id)) {
                        this.data.videos.push({
                            id,
                            category: this.data.addCat,
                            status: 'new',
                            progress: 0,
                            duration: 0,
                            added: Date.now(),
                            lastWatched: 0,
                        });
                        added++;
                    }
                });

                if (added === 0) {
                    alert('All videos already in your library.');
                } else {
                    this.data.modalOpen = false;
                    this.saveState();
                }
            },

            deleteVideo(id) {
                if (!confirm('Delete this video?')) return;
                this.data.videos = this.data.videos.filter(v => v.id !== id);
                this.saveState();
            },

            getVideoTitle(id) {
                const video = this.data.videos.find(v => v.id === id);
                if (video && video.title) return video.title;
                return `Lecture ${id.slice(0, 6)}…`;
            },

            getNextVideo() {
                const list = this.data.videos.filter(v => v.status !== 'completed');
                if (list.length === 0) return null;
                const inProgress = list.filter(v => v.status === 'in-progress');
                if (inProgress.length > 0) {
                    return inProgress.sort((a, b) => b.lastWatched - a.lastWatched)[0];
                }
                return list.sort((a, b) => b.added - a.added)[0];
            },

            // ─── PLAYER ───────────────────────────────────────────────
            playVideo(id) {
                const video = this.data.videos.find(v => v.id === id);
                if (!video) return;
                this.closePlayer();
                this.player.currentVideoId = id;

                const overlay = document.createElement('div');
                overlay.className = 'player-overlay fade-in';
                overlay.id = 'fs-container';
                overlay.innerHTML = `
                    <div class="player-controls">
                        <button class="ctrl-btn" onclick="app.toggleFullScreen()" title="Fullscreen">
                            <i data-lucide="maximize" width="18"></i>
                        </button>
                        <button class="ctrl-btn" onclick="app.closePlayer()" title="Close">
                            <i data-lucide="x" width="18"></i>
                        </button>
                    </div>
                    <div class="video-wrapper">
                        <div id="player-container"></div>
                    </div>
                    <div class="player-info" id="player-info">
                        <span id="p-session">⏱ 0:00</span>
                        <span id="p-daily">📚 0m / ${this.daily.dailyGoal}m</span>
                        <span id="p-status" style="color:#4ade80;">● Playing</span>
                    </div>
                `;
                document.body.appendChild(overlay);
                lucide.createIcons();

                const startSec = Math.floor(video.progress || 0);
                const player = new YT.Player('player-container', {
                    videoId: id,
                    playerVars: {
                        autoplay: 1,
                        start: startSec,
                        rel: 0,
                        modestbranding: 1,
                        fs: 0,
                    },
                    events: {
                        onReady: (e) => {
                            const dur = e.target.getDuration();
                            if (dur && dur > 0) {
                                const v = this.data.videos.find(v => v.id === id);
                                if (v) { v.duration = dur;
                                    this.saveState(); }
                            }
                            this.player.instance = e.target;
                            this.player.sessionStart = Date.now();
                            this.player.sessionSeconds = 0;
                            this.player.isTracking = true;
                            this.player.timerInterval = setInterval(() => {
                                this.updatePlayerUI(e.target);
                            }, 1000);
                        },
                        onStateChange: (e) => {
                            const data = e.data;
                            if (data === YT.PlayerState.PLAYING) {
                                this.player.isTracking = true;
                                this.player.sessionStart = Date.now();
                                const status = document.getElementById('p-status');
                                if (status) { status.textContent = '▶ Playing';
                                    status.style.color = '#4ade80'; }
                            } else if (data === YT.PlayerState.PAUSED) {
                                this.player.isTracking = false;
                                if (this.player.sessionStart > 0) {
                                    const elapsed = (Date.now() - this.player.sessionStart) / 1000;
                                    this.player.sessionSeconds += elapsed;
                                    this.addWatchTime(elapsed);
                                    this.player.sessionStart = Date.now();
                                }
                                const status = document.getElementById('p-status');
                                if (status) { status.textContent = '⏸ Paused';
                                    status.style.color = '#facc15'; }
                            } else if (data === YT.PlayerState.ENDED) {
                                this.player.isTracking = false;
                                if (this.player.sessionStart > 0) {
                                    const elapsed = (Date.now() - this.player.sessionStart) / 1000;
                                    this.player.sessionSeconds += elapsed;
                                    this.addWatchTime(elapsed);
                                    this.player.sessionStart = 0;
                                }
                                const status = document.getElementById('p-status');
                                if (status) { status.textContent = '✓ Done';
                                    status.style.color = '#4ade80'; }
                                const v = this.data.videos.find(v => v.id === id);
                                if (v) {
                                    v.status = 'completed';
                                    v.progress = v.duration || 0;
                                    this.saveState();
                                }
                                setTimeout(() => this.closePlayer(), 2500);
                            }
                        },
                        onError: (e) => {
                            console.warn('YouTube error:', e.data);
                            const status = document.getElementById('p-status');
                            if (status) { status.textContent = '⚠ Error';
                                status.style.color = '#ef4444'; }
                        }
                    }
                });
                this.player.instance = player;
            },

            updatePlayerUI(player) {
                if (!player) return;
                try {
                    const currentTime = player.getCurrentTime();
                    const duration = player.getDuration();
                    const id = this.player.currentVideoId;
                    if (id && currentTime > 0) {
                        const v = this.data.videos.find(v => v.id === id);
                        if (v) {
                            v.progress = currentTime;
                            v.duration = duration || v.duration;
                            v.status = 'in-progress';
                            v.lastWatched = Date.now();
                            if (Math.floor(currentTime) % 5 === 0) {
                                this.saveState();
                            }
                        }
                    }
                    let elapsed = this.player.sessionSeconds;
                    if (this.player.isTracking && this.player.sessionStart > 0) {
                        elapsed += (Date.now() - this.player.sessionStart) / 1000;
                    }
                    const mins = Math.floor(elapsed / 60);
                    const secs = Math.floor(elapsed % 60);
                    const sessionEl = document.getElementById('p-session');
                    if (sessionEl) {
                        sessionEl.textContent = `⏱ ${mins}:${secs.toString().padStart(2, '0')}`;
                    }
                    const prog = this.getDailyProgress();
                    const dailyEl = document.getElementById('p-daily');
                    if (dailyEl) {
                        const watchedMin = Math.floor(prog.watchedSec / 60);
                        const goalMin = this.daily.dailyGoal;
                        dailyEl.textContent = `📚 ${watchedMin}m / ${goalMin}m`;
                        if (prog.isComplete) {
                            dailyEl.textContent = `✅ ${watchedMin}m / ${goalMin}m — Goal met! 🎉`;
                        }
                    }
                } catch (_) { /* ignore */ }
            },

            toggleFullScreen() {
                const elem = document.getElementById('fs-container');
                if (!elem) return;
                if (!document.fullscreenElement) {
                    if (elem.requestFullscreen) elem.requestFullscreen();
                    else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                    else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                }
            },

            closePlayer() {
                if (this.player.timerInterval) {
                    clearInterval(this.player.timerInterval);
                    this.player.timerInterval = null;
                }
                if (this.player.isTracking && this.player.sessionStart > 0) {
                    const elapsed = (Date.now() - this.player.sessionStart) / 1000;
                    if (elapsed > 0) {
                        this.player.sessionSeconds += elapsed;
                        this.addWatchTime(elapsed);
                    }
                }
                this.player.isTracking = false;
                this.player.sessionStart = 0;
                if (this.player.instance && typeof this.player.instance.destroy === 'function') {
                    try { this.player.instance.destroy(); } catch (_) {}
                }
                this.player.instance = null;
                this.player.currentVideoId = null;
                const ov = document.querySelector('.player-overlay');
                if (ov) ov.remove();
                if (document.fullscreenElement) {
                    if (document.exitFullscreen) document.exitFullscreen();
                }
                this.saveState();
                this.render();
            },

            // ─── TIMER FUNCTIONS ──────────────────────────────────────

            setTimerMode(mode) {
                if (this.timer.mode === mode) return;
                this.saveTimer();
                this.timer.mode = mode;
                // Ensure intervals are stopped for the old mode
                this.stopPomodoroInterval();
                this.stopStopwatchInterval();
                // If switching to pomodoro, reset to idle if needed
                if (mode === 'pomodoro') {
                    const p = this.timer.pomodoro;
                    if (p.state === 'running') {
                        p.state = 'idle';
                        this.stopPomodoroInterval();
                    }
                }
                this.render();
            },

            // Pomodoro
            startPomodoro() {
                const p = this.timer.pomodoro;
                if (p.state === 'running') return;
                // If idle and remaining is 0, reset to current phase
                if (p.state === 'idle' && p.remaining <= 0) {
                    p.remaining = p.isBreak ? p.breakDuration * 60 : p.workDuration * 60;
                }
                p.state = 'running';
                this.startPomodoroInterval();
                this.saveTimer();
                this.render();
            },

            pausePomodoro() {
                const p = this.timer.pomodoro;
                if (p.state !== 'running') return;
                p.state = 'paused';
                this.stopPomodoroInterval();
                this.saveTimer();
                this.render();
            },

            resetPomodoro() {
                const p = this.timer.pomodoro;
                this.stopPomodoroInterval();
                p.state = 'idle';
                p.isBreak = false;
                p.remaining = p.workDuration * 60;
                this.saveTimer();
                this.render();
            },

            skipPomodoro() {
                const p = this.timer.pomodoro;
                if (p.state === 'idle') {
                    // If idle, just switch phase without adding time
                    if (!p.isBreak) {
                        p.isBreak = true;
                        p.remaining = p.breakDuration * 60;
                    } else {
                        p.isBreak = false;
                        p.remaining = p.workDuration * 60;
                    }
                    this.saveTimer();
                    this.render();
                    return;
                }
                // Running or paused: add time spent so far
                this.stopPomodoroInterval();
                if (!p.isBreak) {
                    const workTime = p.workDuration * 60 - p.remaining;
                    if (workTime > 0) {
                        this.addWatchTime(workTime);
                        p.sessionsCompleted += 1;
                    }
                    p.isBreak = true;
                    p.remaining = p.breakDuration * 60;
                } else {
                    p.isBreak = false;
                    p.remaining = p.workDuration * 60;
                }
                p.state = 'idle';
                this.saveTimer();
                this.render();
            },

            updatePomodoroSetting(type, value) {
                const p = this.timer.pomodoro;
                if (type === 'work') {
                    p.workDuration = Math.max(1, Math.min(120, value));
                    // If idle and not break, reset remaining to new work duration
                    if (p.state === 'idle' && !p.isBreak) {
                        p.remaining = p.workDuration * 60;
                    }
                } else if (type === 'break') {
                    p.breakDuration = Math.max(1, Math.min(30, value));
                    if (p.state === 'idle' && p.isBreak) {
                        p.remaining = p.breakDuration * 60;
                    }
                }
                this.saveTimer();
                this.render();
            },

            startPomodoroInterval() {
                this.stopPomodoroInterval();
                this.timer.pomodoro.timerInterval = setInterval(() => {
                    const p = this.timer.pomodoro;
                    if (p.state !== 'running') return;
                    p.remaining -= 1;
                    if (p.remaining <= 0) {
                        this.stopPomodoroInterval();
                        if (!p.isBreak) {
                            // Work session completed
                            this.addWatchTime(p.workDuration * 60);
                            p.sessionsCompleted += 1;
                            p.isBreak = true;
                            p.remaining = p.breakDuration * 60;
                            p.state = 'idle';
                            this.saveTimer();
                            this.render();
                            if (Notification.permission === 'granted') {
                                new Notification('Study session complete! Time for a break 🎉');
                            } else {
                                alert('Work session complete! Take a break.');
                            }
                        } else {
                            // Break finished
                            p.isBreak = false;
                            p.remaining = p.workDuration * 60;
                            p.state = 'idle';
                            this.saveTimer();
                            this.render();
                            if (Notification.permission === 'granted') {
                                new Notification('Break is over! Ready for another session?');
                            } else {
                                alert('Break finished. Start next session?');
                            }
                        }
                    } else {
                        if (this.data.tab === 'timer') {
                            this.render();
                        }
                    }
                }, 1000);
            },

            stopPomodoroInterval() {
                if (this.timer.pomodoro.timerInterval) {
                    clearInterval(this.timer.pomodoro.timerInterval);
                    this.timer.pomodoro.timerInterval = null;
                }
            },

            // Stopwatch
            startStopwatch() {
                const sw = this.timer.stopwatch;
                if (sw.running) return;
                sw.running = true;
                this.startStopwatchInterval();
                this.saveTimer();
                this.render();
            },

            pauseStopwatch() {
                const sw = this.timer.stopwatch;
                if (!sw.running) return;
                sw.running = false;
                this.stopStopwatchInterval();
                this.saveTimer();
                this.render();
            },

            resetStopwatch() {
                const sw = this.timer.stopwatch;
                this.stopStopwatchInterval();
                sw.running = false;
                sw.elapsed = 0;
                this.saveTimer();
                this.render();
            },

            startStopwatchInterval() {
                this.stopStopwatchInterval();
                this.timer.stopwatch.timerInterval = setInterval(() => {
                    const sw = this.timer.stopwatch;
                    if (!sw.running) return;
                    sw.elapsed += 1;
                    if (sw.elapsed % 60 === 0) {
                        this.addWatchTime(60);
                    }
                    if (this.data.tab === 'timer') {
                        this.render();
                    }
                }, 1000);
            },

            stopStopwatchInterval() {
                if (this.timer.stopwatch.timerInterval) {
                    clearInterval(this.timer.stopwatch.timerInterval);
                    this.timer.stopwatch.timerInterval = null;
                }
            },

            formatTime(seconds) {
                const m = Math.floor(seconds / 60);
                const s = Math.floor(seconds % 60);
                return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            },

            // ─── EXPORT / IMPORT ───
            exportData() {
                const data = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(this.data.videos));
                const a = document.createElement('a');
                a.href = data;
                a.download = 'study_backup.json';
                document.body.appendChild(a);
                a.click();
                a.remove();
            },

            importData(el) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        this.data.videos = JSON.parse(e.target.result);
                        this.saveState();
                    } catch (_) { alert('Invalid file.'); }
                };
                reader.readAsText(el.files[0]);
                el.value = '';
            },

            // ─── RENDER ─────────────────────────────────────────────────
            render() {
                const isHome = this.data.tab === 'home';
                const isTimer = this.data.tab === 'timer';
                let list = this.data.videos;

                if (!isHome && !isTimer) {
                    list = list.filter(v => v.category === this.data.tab);
                } else if (isHome) {
                    list = list.filter(v => v.status === 'in-progress').sort((a, b) => b.lastWatched - a.lastWatched);
                }

                if (!isHome && !isTimer) {
                    list.sort((a, b) => {
                        const order = { 'in-progress': 0, 'new': 1, 'completed': 2 };
                        if (order[a.status] !== order[b.status]) return order[a.status] - order[b.status];
                        if (a.status === 'in-progress') return b.lastWatched - a.lastWatched;
                        return b.added - a.added;
                    });
                }

                let html = `
                    <nav class="navbar">
                        <div class="logo"><i data-lucide="book-open" width="20"></i> StudyStream</div>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <button class="theme-toggle" onclick="app.toggleTheme()" style="background:none;border:none;color:var(--text-sec);cursor:pointer;display:flex;align-items:center;gap:4px;font-size:0.8rem;">
                                <i data-lucide="${this.data.theme === 'dark' ? 'moon' : this.data.theme === 'light' ? 'sun' : 'monitor'}"></i>
                            </button>
                            <button class="btn-add" onclick="app.toggleModal(true)"><i data-lucide="plus" width="16"></i> Add</button>
                        </div>
                    </nav>
                    <div class="container fade-in">
                `;

                // ── Daily Progress (home & timer) ──
                if (isHome || isTimer) {
                    const prog = this.getDailyProgress();
                    const isComplete = prog.isComplete;
                    const watchedMin = Math.floor(prog.watchedSec / 60);
                    const goalMin = this.daily.dailyGoal;
                    const pct = Math.min(prog.percent, 100);
                    const streak = this.daily.streak;

                    let msg = 'Start your study session! 🚀';
                    if (isComplete) {
                        const msgs = [
                            'Goal crushed! 🎉 You\'re unstoppable!',
                            'Amazing focus! 🔥 Keep the streak alive!',
                            'You did it! 💪 One step closer to mastery!',
                            'Legendary! ⭐ Daily goal complete!',
                        ];
                        msg = msgs[Math.floor(Math.random() * msgs.length)];
                    } else if (watchedMin > 0) {
                        const remain = goalMin - watchedMin;
                        if (remain <= 5) msg = `Almost there! Just ${remain}m more! 🔥`;
                        else if (remain <= 15) msg = `Great start! ${remain}m to go! 💪`;
                        else msg = `Keep going! ${remain}m remaining today. 📖`;
                    } else if (streak > 0) {
                        msg = `You're on a ${streak}-day streak! Let's go! 🔥`;
                    }

                    html += `
                        <div class="daily-card">
                            <div class="daily-left">
                                <div class="streak">
                                    ${streak > 0 ? '🔥' : '💪'} ${streak} day${streak !== 1 ? 's' : ''}
                                    <span>streak</span>
                                </div>
                                <div class="time-label">
                                    Today: <strong>${watchedMin}m</strong> / ${goalMin}m
                                    ${isComplete ? ' ✅' : ''}
                                </div>
                            </div>
                            <div class="daily-mid">
                                <div class="progress-track">
                                    <div class="fill" style="width:${pct}%;${isComplete ? 'background:linear-gradient(90deg,#22c55e,#4ade80);' : ''}"></div>
                                </div>
                                <div class="progress-stats">
                                    <span>${Math.round(pct)}%</span>
                                    <span>${isComplete ? '🎯 Done!' : `${Math.max(0, goalMin - watchedMin)}m left`}</span>
                                </div>
                            </div>
                            <div class="daily-right">
                                <div class="msg">${msg}</div>
                                <button class="btn-goal" onclick="app.toggleGoalModal(true)">Set Goal</button>
                            </div>
                        </div>
                    `;

                    if (isHome) {
                        const next = this.getNextVideo();
                        if (next) {
                            html += `
                                <div style="margin-bottom:20px;">
                                    <button onclick="app.playVideo('${next.id}')" style="width:100%; padding:12px; background:var(--primary); color:#fff; border:none; border-radius:var(--radius); font-weight:600; font-size:0.95rem; display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; transition:transform 0.15s;">
                                        <i data-lucide="play-circle" width="20"></i> Resume Study Session
                                    </button>
                                </div>
                            `;
                        }
                    }
                }

                // ── Dashboard Grid (home only) ──
                if (isHome) {
                    html += `<div class="section-title"><i data-lucide="layout-dashboard" width="18"></i> Dashboard</div>`;
                    html += `<div class="dash-grid">`;
                    const cats = ['physics', 'chemistry', 'biology'];
                    const icons = { physics: 'atom', chemistry: 'flask-conical', biology: 'dna' };
                    cats.forEach(c => {
                        const total = this.data.videos.filter(v => v.category === c).length;
                        const left = this.data.videos.filter(v => v.category === c && v.status !== 'completed').length;
                        const pct = total > 0 ? Math.round(((total - left) / total) * 100) : 0;
                        html += `
                            <div class="dash-card" onclick="app.setTab('${c}')">
                                <i data-lucide="${icons[c]}" style="color:var(--primary);"></i>
                                <h3>${c}</h3>
                                <small>${left} left · ${pct}% done</small>
                                <div class="count-badge">${total}</div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }

                // ── Timer Tab ──
                if (isTimer) {
                    html += `<div class="timer-container">`;
                    // Mode tabs
                    html += `
                        <div class="timer-mode-tabs">
                            <button class="${this.timer.mode === 'pomodoro' ? 'active' : ''}" onclick="app.setTimerMode('pomodoro')">🍅 Pomodoro</button>
                            <button class="${this.timer.mode === 'stopwatch' ? 'active' : ''}" onclick="app.setTimerMode('stopwatch')">⏱ Stopwatch</button>
                        </div>
                    `;

                    if (this.timer.mode === 'pomodoro') {
                        const p = this.timer.pomodoro;
                        const total = p.isBreak ? p.breakDuration * 60 : p.workDuration * 60;
                        const remaining = p.remaining;
                        const progress = total > 0 ? ((total - remaining) / total) * 100 : 0;
                        const label = p.isBreak ? 'Break' : 'Focus';
                        const stateLabel = p.state === 'running' ? '▶' : p.state === 'paused' ? '⏸' : '⏹';

                        html += `
                            <div class="timer-display">
                                ${this.formatTime(remaining)}
                                <span class="label">${label} · ${stateLabel}</span>
                            </div>
                            <div style="width:80%;max-width:300px;">
                                <div class="progress-track"><div class="fill" style="width:${Math.min(progress,100)}%;"></div></div>
                            </div>
                            <div class="timer-controls">
                                ${p.state === 'running' ? 
                                    `<button class="btn-pause" onclick="app.pausePomodoro()"><i data-lucide="pause"></i> Pause</button>` :
                                    `<button class="btn-start" onclick="app.startPomodoro()"><i data-lucide="play"></i> ${p.state === 'idle' ? 'Start' : 'Resume'}</button>`
                                }
                                <button class="btn-reset" onclick="app.resetPomodoro()"><i data-lucide="refresh-cw"></i> Reset</button>
                                <button class="btn-skip" onclick="app.skipPomodoro()"><i data-lucide="skip-forward"></i> Skip</button>
                            </div>
                            <div class="timer-stats">
                                <div class="stat"><div class="num">${p.sessionsCompleted}</div><div class="lbl">Sessions</div></div>
                                <div class="stat"><div class="num">${p.isBreak ? 'Break' : 'Focus'}</div><div class="lbl">Phase</div></div>
                            </div>
                            <div class="timer-settings">
                                <label>Work <input type="number" min="1" max="120" value="${p.workDuration}" 
                                    onchange="app.updatePomodoroSetting('work', parseInt(this.value)||25)" 
                                    ${p.state === 'running' ? 'disabled' : ''}></label>
                                <label>Break <input type="number" min="1" max="30" value="${p.breakDuration}" 
                                    onchange="app.updatePomodoroSetting('break', parseInt(this.value)||5)"
                                    ${p.state === 'running' ? 'disabled' : ''}></label>
                            </div>
                            <p style="font-size:0.8rem;color:var(--text-sec);">Pomodoro sessions automatically count toward your daily goal.</p>
                        `;
                    } else {
                        // Stopwatch
                        const sw = this.timer.stopwatch;
                        const elapsed = sw.elapsed;
                        html += `
                            <div class="timer-display">
                                ${this.formatTime(elapsed)}
                                <span class="label">${sw.running ? '▶ Running' : '⏹ Stopped'}</span>
                            </div>
                            <div class="timer-controls">
                                ${sw.running ? 
                                    `<button class="btn-pause" onclick="app.pauseStopwatch()"><i data-lucide="pause"></i> Pause</button>` :
                                    `<button class="btn-start" onclick="app.startStopwatch()"><i data-lucide="play"></i> Start</button>`
                                }
                                <button class="btn-reset" onclick="app.resetStopwatch()"><i data-lucide="refresh-cw"></i> Reset</button>
                            </div>
                            <div class="timer-stats">
                                <div class="stat"><div class="num">${Math.floor(elapsed / 60)}m</div><div class="lbl">Elapsed</div></div>
                            </div>
                            <p style="font-size:0.8rem;color:var(--text-sec);">Time is added to your daily goal every minute.</p>
                        `;
                    }
                    html += `</div>`;
                }

                // ── Video List (home or category) ──
                if (!isTimer) {
                    if (!isHome) {
                        const catName = this.data.tab.charAt(0).toUpperCase() + this.data.tab.slice(1);
                        const total = this.data.videos.filter(v => v.category === this.data.tab).length;
                        const left = this.data.videos.filter(v => v.category === this.data.tab && v.status !== 'completed')
                            .length;
                        html += `
                            <div class="flex-between" style="margin-bottom:16px;">
                                <h2 style="text-transform:capitalize;">${catName}</h2>
                                <span style="color:var(--text-sec);font-size:0.85rem;">${left} remaining · ${total} total</span>
                            </div>
                        `;
                    } else {
                        html += `<div class="section-title" style="margin-top:8px;"><i data-lucide="clock" width="18"></i> Continue Watching</div>`;
                    }

                    if (list.length === 0) {
                        const msg = isHome ? 'No videos in progress. Add some lectures to get started!' :
                            `No videos in ${this.data.tab} yet.`;
                        html +=
                            `<div class="empty-state"><i data-lucide="inbox" width="28" style="display:block;margin:0 auto 8px;color:var(--text-sec);"></i>${msg}</div>`;
                    } else {
                        list.forEach(v => {
                            const pct = v.duration ? Math.min((v.progress / v.duration) * 100, 100) : 0;
                            const statusLabel = v.status === 'completed' ? 'Completed' :
                                v.status === 'in-progress' ? 'In Progress' : 'New';
                            const dotClass = v.status === 'completed' ? 'completed' :
                                v.status === 'in-progress' ? 'in-progress' : 'new';
                            const isComplete = v.status === 'completed';
                            html += `
                                <div class="video-card ${isComplete ? 'completed' : ''}" data-id="${v.id}">
                                    <div class="thumb-box" onclick="app.playVideo('${v.id}')">
                                        <img src="https://img.youtube.com/vi/${v.id}/hqdefault.jpg" alt="thumbnail" loading="lazy">
                                        <div class="play-icon"><i data-lucide="play" width="18" fill="currentColor"></i></div>
                                    </div>
                                    <div class="progress-bar"><div class="fill" style="width:${isComplete ? 100 : pct}%"></div></div>
                                    <div class="card-meta">
                                        <div class="v-info">
                                            <span class="v-cat">${v.category}</span>
                                            <h3>${this.getVideoTitle(v.id)}</h3>
                                            <div class="v-status">
                                                <span class="dot ${dotClass}"></span>
                                                ${statusLabel} ${v.duration ? `· ${Math.floor(v.progress)}s / ${Math.floor(v.duration)}s` : ''}
                                            </div>
                                        </div>
                                        <div class="card-actions">
                                            ${!isComplete ? `<button class="btn-resume" onclick="app.playVideo('${v.id}')">Resume</button>` : ''}
                                            <button onclick="app.deleteVideo('${v.id}')" title="Delete"><i data-lucide="trash-2" width="16"></i></button>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                    }
                }

                // ── Export / Import (home only) ──
                if (isHome) {
                    html += `
                        <div style="margin-top:32px; border-top:1px solid #e2e8f0; padding-top:20px; display:flex; flex-wrap:wrap; gap:10px; justify-content:space-between;">
                            <button onclick="app.exportData()" style="padding:8px 18px; background:#e2e8f0; border:none; border-radius:8px; font-size:0.8rem; cursor:pointer; color:var(--text-main);">📤 Export Backup</button>
                            <label style="padding:8px 18px; background:#e2e8f0; border:none; border-radius:8px; font-size:0.8rem; cursor:pointer; color:var(--text-main);">
                                📥 Import Backup
                                <input type="file" hidden accept=".json" onchange="app.importData(this)">
                            </label>
                        </div>
                    `;
                }

                html += `</div>`;

                // ── Modals ──
                if (this.data.modalOpen) {
                    html += `
                        <div class="modal-wrap" onclick="if(event.target===this) app.toggleModal(false)">
                            <div class="modal-box fade-in">
                                <h3>📥 Add Videos</h3>
                                <div class="cat-picker">
                                    ${['physics','chemistry','biology'].map(c =>
                                        `<button class="${this.data.addCat === c ? 'active' : ''}" onclick="app.setCat('${c}')">${c}</button>`
                                    ).join('')}
                                </div>
                                <textarea id="linkBox" class="input-area" placeholder="Paste YouTube links (one per line)…"></textarea>
                                <div class="modal-actions">
                                    <button class="btn-primary" onclick="app.addVideos()">Import</button>
                                    <button class="btn-secondary" onclick="app.toggleModal(false)">Cancel</button>
                                </div>
                            </div>
                        </div>
                    `;
                }

                if (this.data.goalModal) {
                    html += `
                        <div class="modal-wrap" onclick="if(event.target===this) app.toggleGoalModal(false)">
                            <div class="modal-box fade-in">
                                <h3>🎯 Set Daily Goal</h3>
                                <p style="color:var(--text-sec);font-size:0.9rem;margin:4px 0 12px;">How many minutes do you want to study each day?</p>
                                <div style="display:flex;align-items:center;gap:12px;margin:8px 0 16px;">
                                    <input type="range" min="5" max="180" step="5" value="${this.goalInput}" 
                                        oninput="document.getElementById('goalDisplay').textContent=this.value+'m'; app.goalInput=parseInt(this.value)"
                                        style="flex:1;accent-color:var(--primary);">
                                    <span id="goalDisplay" style="font-size:1.2rem;font-weight:700;min-width:50px;">${this.goalInput}m</span>
                                </div>
                                <div class="modal-actions">
                                    <button class="btn-primary" onclick="app.setGoal(app.goalInput)">Set Goal</button>
                                    <button class="btn-secondary" onclick="app.toggleGoalModal(false)">Cancel</button>
                                </div>
                            </div>
                        </div>
                    `;
                }

                // ── Bottom Nav ──
                html += `
                    <div class="btm-nav">
                        ${['home','physics','chemistry','biology','timer'].map(t => {
                            const iconMap = {
                                home: 'home',
                                physics: 'atom',
                                chemistry: 'flask-conical',
                                biology: 'dna',
                                timer: 'timer'
                            };
                            const icon = iconMap[t] || 'circle';
                            const isActive = this.data.tab === t;
                            const left = t !== 'home' && t !== 'timer' ? this.data.videos.filter(v => v.category === t && v.status !== 'completed').length : 0;
                            return `
                                <button class="btm-btn ${isActive ? 'active' : ''}" onclick="app.setTab('${t}')">
                                    <i data-lucide="${icon}" width="20"></i>
                                    <span style="text-transform:capitalize">${t === 'home' ? 'Home' : t}</span>
                                    ${left > 0 && t !== 'home' && t !== 'timer' ? `<span style="font-size:0.55rem;background:var(--primary);color:#fff;border-radius:99px;padding:0 6px;line-height:14px;">${left}</span>` : ''}
                                </button>
                            `;
                        }).join('')}
                    </div>
                `;

                document.getElementById('app').innerHTML = html;
                lucide.createIcons();

                if (this.data.modalOpen) {
                    setTimeout(() => {
                        const box = document.getElementById('linkBox');
                        if (box) box.focus();
                    }, 100);
                }
            }
        };

        // ─── BOOT ───
        window.onload = () => {
            if (typeof YT !== 'undefined' && YT.loaded) {
                app.init();
            } else {
                const checkYT = setInterval(() => {
                    if (typeof YT !== 'undefined' && YT.loaded) {
                        clearInterval(checkYT);
                        app.init();
                    }
                }, 200);
                setTimeout(() => {
                    if (!app.daily.todayDate) {
                        app.init();
                    }
                }, 3000);
            }

            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }

            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/study-stream/sw.js')
                        .then(reg => console.log('✅ PWA Registered'))
                        .catch(err => console.log('❌ SW Error', err));
                });
            }
        };

        window.app = app;
    </script>
</body>
    </html>
