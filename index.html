<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>PeerDrop Ultra</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#2563eb">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script src="https://unpkg.com/html5-qrcode"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

</head>

<body>

<div class="app">

<div class="topbar">

<h1>PeerDrop Ultra</h1>

<p>Fast P2P File Sharing</p>

</div>

<div class="card">

<h2>Your ID</h2>

<div id="peerId" class="peer-box">
Generating...
</div>

<canvas id="qrCanvas"></canvas>

</div>

<div class="card">

<h2>Connect</h2>

<input type="text"
id="peerInput"
placeholder="Enter Peer ID">

<div class="btns">

<button id="connectBtn">
Connect
</button>

<button id="scanBtn">
Scan QR
</button>

</div>

<div id="reader"></div>

</div>

<div class="card">

<div id="status">
Disconnected
</div>

<div id="messages"></div>

<div class="chat-box">

<input type="text"
id="messageInput"
placeholder="Type message">

<button id="sendBtn">
Send
</button>

</div>

</div>

<div class="card">

<h2>Files</h2>

<div id="dropzone">

Drop Files Here

</div>

<input type="file"
id="fileInput"
multiple>

<div class="btns">

<button id="sendFilesBtn">
Send Files
</button>

<button id="downloadAllBtn">
Download ZIP
</button>

</div>

<div id="transfers"></div>

<div id="downloads"></div>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
