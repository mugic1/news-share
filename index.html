<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyStream</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#000000" />
    <script src="https://unpkg.com/lucide@latest">
    </script>
    <script src="https://www.youtube.com/iframe_api">
    </script>

    <style>
        /* ─── CORE STYLES ─── */
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text-main: #1e293b;
            --text-sec: #64748b;
            --radius: 14px;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --surface: #1e293b;
                --text-main: #f1f5f9;
                --text-sec: #94a3b8;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            padding-bottom: 80px;
            transition: background 0.2s;
        }

        .hidden {
            display: none !important;
        }
        .fade-in {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ─── NAVBAR ─── */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--surface);
            border-bottom: 1px solid rgba(0, 0, 0, 0.07);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
            backdrop-filter: blur(6px);
        }
        .logo {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-add {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 24px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .btn-add:active {
            transform: scale(0.96);
        }

        /* ─── CONTAINER ─── */
        .container {
            max-width: 820px;
            margin: 72px auto 0;
            padding: 0 16px 20px;
        }

        /* ─── DAILY PROGRESS CARD ─── */
        .daily-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 20px 20px 18px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px;
        }
        .daily-left {
            flex: 1 1 180px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .daily-left .streak {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .daily-left .streak span {
            color: var(--text-sec);
            font-weight: 400;
            font-size: 0.9rem;
        }
        .daily-left .time-label {
            font-size: 0.9rem;
            color: var(--text-sec);
        }
        .daily-left .time-label strong {
            color: var(--text-main);
        }

        .daily-mid {
            flex: 2 1 200px;
            min-width: 120px;
        }
        .progress-track {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 99px;
            overflow: hidden;
            margin: 6px 0 4px;
        }
        .progress-track .fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 99px;
            transition: width 0.4s ease;
            width: 0%;
        }
        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-sec);
        }

        .daily-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            margin-left: auto;
        }
        .daily-right .msg {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--primary);
            text-align: right;
            max-width: 180px;
        }
        .daily-right .btn-goal {
            background: none;
            border: 1px solid #d1d5db;
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.7rem;
            color: var(--text-sec);
            cursor: pointer;
            transition: 0.15s;
        }
        .daily-right .btn-goal:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .daily-complete {
            background: #22c55e20;
            border: 1px solid #22c55e40;
            border-radius: var(--radius);
            padding: 12px 18px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            color: #15803d;
        }
        .daily-complete i {
            color: #22c55e;
        }

        /* ─── DASHBOARD GRID ─── */
        .dash-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }
        .dash-card {
            background: var(--surface);
            padding: 16px 10px;
            border-radius: var(--radius);
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .dash-card:active {
            transform: scale(0.96);
        }
        .dash-card h3 {
            font-size: 0.9rem;
            margin-top: 4px;
            text-transform: capitalize;
        }
        .dash-card small {
            color: var(--text-sec);
            font-size: 0.75rem;
        }
        .dash-card .count-badge {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            border-radius: 99px;
            padding: 0 10px;
            font-size: 0.7rem;
            font-weight: 600;
            line-height: 20px;
            margin-top: 4px;
        }

        /* ─── VIDEO CARD ─── */
        .video-card {
            background: var(--surface);
            border-radius: var(--radius);
            margin-bottom: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            transition: opacity 0.2s;
        }
        .video-card.completed {
            opacity: 0.55;
            filter: grayscale(0.6);
        }
        .thumb-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #0a0a0a;
            cursor: pointer;
            overflow: hidden;
        }
        .thumb-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.92);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #111;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
            transition: transform 0.15s;
        }
        .thumb-box:hover .play-icon {
            transform: translate(-50%, -50%) scale(1.05);
        }
        .progress-bar {
            height: 4px;
            background: #e2e8f0;
            width: 100%;
        }
        .progress-bar .fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }

        .card-meta {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .v-info {
            flex: 1;
            min-width: 0;
        }
        .v-info .v-cat {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--text-sec);
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        .v-info h3 {
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .v-info .v-status {
            font-size: 0.7rem;
            color: var(--text-sec);
            margin-top: 2px;
        }
        .v-info .v-status .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
        }
        .v-info .v-status .dot.in-progress {
            background: #eab308;
        }
        .v-info .v-status .dot.completed {
            background: #22c55e;
        }
        .v-info .v-status .dot.new {
            background: #3b82f6;
        }

        .card-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .card-actions button {
            background: none;
            border: none;
            color: var(--text-sec);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: background 0.15s, color 0.15s;
        }
        .card-actions button:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
        .card-actions .btn-resume {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .card-actions .btn-resume:active {
            transform: scale(0.94);
        }

        /* ─── PLAYER OVERLAY ─── */
        .player-overlay {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .player-overlay .player-controls {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 10px;
            z-index: 1001;
        }
        .player-overlay .player-controls .ctrl-btn {
            color: #fff;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.15s;
        }
        .player-overlay .player-controls .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }
        .player-overlay .player-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            padding: 6px 18px;
            border-radius: 99px;
            z-index: 1001;
            display: flex;
            align-items: center;
            gap: 14px;
            white-space: nowrap;
        }
        .player-overlay .player-info .p-progress {
            color: #fff;
            font-weight: 600;
        }
        .video-wrapper {
            width: 100%;
            max-width: 960px;
            aspect-ratio: 16/9;
            background: #000;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
        }
        .video-wrapper #player-container {
            width: 100%;
            height: 100%;
        }

        /* ─── MODAL ─── */
        .modal-wrap {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-box {
            background: var(--surface);
            width: 100%;
            max-width: 420px;
            padding: 24px 22px;
            border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-box h3 {
            font-size: 1.1rem;
            margin-bottom: 12px;
        }
        .modal-box .input-area {
            width: 100%;
            height: 100px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 10px;
            margin: 10px 0 14px;
            background: var(--bg);
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
        }
        .modal-box .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }
        .modal-box .modal-actions .btn-primary {
            flex: 1;
            background: var(--primary);
            color: #fff;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .modal-box .modal-actions .btn-primary:active {
            transform: scale(0.96);
        }
        .modal-box .modal-actions .btn-secondary {
            padding: 10px 18px;
            border: none;
            background: #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-main);
        }
        .cat-picker {
            display: flex;
            gap: 8px;
            margin: 12px 0 6px;
            flex-wrap: wrap;
        }
        .cat-picker button {
            flex: 1;
            min-width: 60px;
            padding: 8px 4px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: transparent;
            color: var(--text-main);
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: capitalize;
            cursor: pointer;
            transition: 0.15s;
        }
        .cat-picker button.active {
            background: #e0e7ff;
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ─── BOTTOM NAV ─── */
        .btm-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: var(--surface);
            border-top: 1px solid rgba(0, 0, 0, 0.07);
            display: flex;
            justify-content: space-around;
            align-items: center;
            backdrop-filter: blur(6px);
            z-index: 50;
        }
        .btm-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.6rem;
            color: var(--text-sec);
            gap: 2px;
            cursor: pointer;
            padding: 4px 12px;
            transition: color 0.15s;
            position: relative;
        }
        .btm-btn.active {
            color: var(--primary);
        }
        .btm-btn .badge-dot {
            position: absolute;
            top: 0;
            right: 4px;
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            border: 2px solid var(--surface);
        }

        /* ─── MISC ─── */
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .empty-state {
            color: var(--text-sec);
            padding: 20px 0;
            text-align: center;
            font-size: 0.9rem;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .mt-4 {
            margin-top: 16px;
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 480px) {
            .daily-card {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .daily-right {
                align-items: flex-start;
                margin-left: 0;
            }
            .daily-right .msg {
                text-align: left;
                max-width: 100%;
            }
            .dash-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
            .dash-card {
                padding: 12px 6px;
            }
            .dash-card h3 {
                font-size: 0.75rem;
            }
            .player-overlay .player-info {
                font-size: 0.65rem;
                padding: 4px 12px;
                gap: 10px;
                bottom: 12px;
                white-space: normal;
                flex-wrap: wrap;
                justify-content: center;
            }
            .video-wrapper {
                border-radius: 4px;
            }
        }

        @media (min-width: 768px) {
            .btm-nav {
                display: none !important;
            }
            body {
                padding-bottom: 0;
            }
        }
    </style>
</head>
<body>

    <div id="app"></div>

    <script>
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        //  APP STATE
        // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        const STATE_KEY = 'studyStreamDB';
        const DAILY_KEY = 'studyStreamDaily';

        const app = {
            data: {
                tab: 'home',
                videos: [],
                modalOpen: false,
                addCat: 'physics',
                tempLinks: '',
                goalModal: false,
                goalInput: 30,
            },

            // ─── Daily tracking ───
            daily: {
                dailyGoal: 30, // minutes
                streak: 0,
                todayWatchSeconds: 0,
                todayDate: '',
                lastActiveDate: '',
                lastStreakDate: '',
            },

            player: {
                instance: null,
                sessionStart: 0,
                sessionSeconds: 0,
                timerInterval: null,
                isTracking: false,
                currentVideoId: null,
            },

            // ─── Init ───
            init() {
                this.loadState();
                this.loadDaily();
                this.checkDayReset();
                this.render();
                // Listen for visibility change to save progress
                document.addEventListener('visibilitychange', () => {
                    if (document.hidden) this.saveDaily();
                });
                // Auto-save daily every 30s
                setInterval(() => this.saveDaily(), 30000);
            },

            // ─── State IO ───
            loadState() {
                const saved = localStorage.getItem(STATE_KEY);
                if (saved) {
                    try { this.data.videos = JSON.parse(saved); } catch (_) {}
                }
            },

            saveState() {
                localStorage.setItem(STATE_KEY, JSON.stringify(this.data.videos));
                this.render();
            },

            loadDaily() {
                const raw = localStorage.getItem(DAILY_KEY);
                if (raw) {
                    try {
                        const d = JSON.parse(raw);
                        Object.assign(this.daily, d);
                    } catch (_) {}
                }
                if (!this.daily.todayDate) {
                    this.daily.todayDate = this.getToday();
                }
                if (!this.daily.dailyGoal) this.daily.dailyGoal = 30;
            },

            saveDaily() {
                localStorage.setItem(DAILY_KEY, JSON.stringify(this.daily));
            },

            getToday() {
                return new Date().toISOString().slice(0, 10);
            },

            // ─── Day rollover ───
            checkDayReset() {
                const today = this.getToday();
                if (this.daily.todayDate !== today) {
                    // Check if yesterday's goal was met
                    const goalSec = this.daily.dailyGoal * 60;
                    if (this.daily.todayWatchSeconds >= goalSec) {
                        this.daily.streak += 1;
                        this.daily.lastStreakDate = this.daily.todayDate;
                    } else {
                        // Only reset if there was activity yesterday, otherwise keep streak
                        if (this.daily.todayWatchSeconds > 0) {
                            this.daily.streak = 0;
                        }
                        // If no activity, streak stays (grace period)
                    }
                    this.daily.todayWatchSeconds = 0;
                    this.daily.todayDate = today;
                    this.daily.lastActiveDate = today;
                    this.saveDaily();
                }
            },

            // ─── Add watch time ───
            addWatchTime(seconds) {
                if (seconds <= 0) return;
                this.daily.todayWatchSeconds += seconds;
                this.daily.lastActiveDate = this.getToday();
                this.saveDaily();
                // Re-render if on home
                if (this.data.tab === 'home') this.render();
            },

            // ─── Get daily progress ───
            getDailyProgress() {
                const goalSec = this.daily.dailyGoal * 60;
                const watched = Math.min(this.daily.todayWatchSeconds, goalSec);
                return {
                    watchedSec: watched,
                    goalSec: goalSec,
                    percent: goalSec > 0 ? (watched / goalSec) * 100 : 0,
                    isComplete: watched >= goalSec,
                    remainingSec: Math.max(0, goalSec - watched),
                    watchedMin: Math.floor(watched / 60),
                    goalMin: this.daily.dailyGoal,
                };
            },

            // ─── Set goal ───
            setGoal(minutes) {
                if (minutes < 1) minutes = 1;
                if (minutes > 480) minutes = 480;
                this.daily.dailyGoal = minutes;
                this.saveDaily();
                this.data.goalModal = false;
                this.render();
            },

            // ─── Navigation ───
            setTab(t) {
                this.data.tab = t;
                this.render();
                window.scrollTo(0, 0);
            },

            toggleModal(v) {
                this.data.modalOpen = v;
                if (!v) document.getElementById('linkBox') && (document.getElementById('linkBox').value = '');
                this.render();
            },

            toggleGoalModal(v) {
                this.data.goalModal = v;
                if (v) this.goalInput = this.daily.dailyGoal;
                this.render();
            },

            setCat(c) {
                this.data.addCat = c;
                this.render();
            },

            // ─── Add videos ───
            addVideos() {
                const input = document.getElementById('linkBox');
                if (!input) return;
                const text = input.value;
                const matches = text.matchAll(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([\w-]{11})/g);
                const ids = new Set([...matches].map(m => m[1]));

                if (ids.size === 0) {
                    alert('No valid YouTube links found!');
                    return;
                }

                let added = 0;
                ids.forEach(id => {
                    if (!this.data.videos.find(v => v.id === id)) {
                        this.data.videos.push({
                            id,
                            category: this.data.addCat,
                            status: 'new',
                            progress: 0,
                            duration: 0,
                            added: Date.now(),
                            lastWatched: 0,
                        });
                        added++;
                    }
                });

                if (added === 0) {
                    alert('All videos already in your library.');
                } else {
                    this.data.modalOpen = false;
                    this.saveState();
                }
            },

            deleteVideo(id) {
                if (!confirm('Delete this video?')) return;
                this.data.videos = this.data.videos.filter(v => v.id !== id);
                this.saveState();
            },

            // ─── Get video title ───
            getVideoTitle(id) {
                // Use a cached version or return a short id
                const video = this.data.videos.find(v => v.id === id);
                if (video && video.title) return video.title;
                return `Lecture ${id.slice(0, 6)}…`;
            },

            // ─── Get next video to watch ───
            getNextVideo() {
                const list = this.data.videos.filter(v => v.status !== 'completed');
                if (list.length === 0) return null;
                // Prefer in-progress, then newest
                const inProgress = list.filter(v => v.status === 'in-progress');
                if (inProgress.length > 0) {
                    return inProgress.sort((a, b) => b.lastWatched - a.lastWatched)[0];
                }
                return list.sort((a, b) => b.added - a.added)[0];
            },

            // ─── PLAYER ───────────────────────────────────────────────
            playVideo(id) {
                const video = this.data.videos.find(v => v.id === id);
                if (!video) return;

                // Close any existing player
                this.closePlayer();

                this.player.currentVideoId = id;

                const overlay = document.createElement('div');
                overlay.className = 'player-overlay fade-in';
                overlay.id = 'fs-container';
                overlay.innerHTML = `
                    <div class="player-controls">
                        <button class="ctrl-btn" onclick="app.toggleFullScreen()" title="Fullscreen">
                            <i data-lucide="maximize" width="18"></i>
                        </button>
                        <button class="ctrl-btn" onclick="app.closePlayer()" title="Close">
                            <i data-lucide="x" width="18"></i>
                        </button>
                    </div>
                    <div class="video-wrapper">
                        <div id="player-container"></div>
                    </div>
                    <div class="player-info" id="player-info">
                        <span id="p-session">⏱ 0:00</span>
                        <span id="p-daily">📚 0m / ${this.daily.dailyGoal}m</span>
                        <span id="p-status" style="color:#4ade80;">● Playing</span>
                    </div>
                `;
                document.body.appendChild(overlay);
                lucide.createIcons();

                // Init YouTube player
                const startSec = Math.floor(video.progress || 0);
                const player = new YT.Player('player-container', {
                    videoId: id,
                    playerVars: {
                        autoplay: 1,
                        start: startSec,
                        rel: 0,
                        modestbranding: 1,
                        fs: 0,
                    },
                    events: {
                        onReady: (e) => {
                            // Video duration may be available
                            const dur = e.target.getDuration();
                            if (dur && dur > 0) {
                                const v = this.data.videos.find(v => v.id === id);
                                if (v) { v.duration = dur;
                                    this.saveState(); }
                            }
                            // Start tracking
                            this.player.instance = e.target;
                            this.player.sessionStart = Date.now();
                            this.player.sessionSeconds = 0;
                            this.player.isTracking = true;
                            this.player.timerInterval = setInterval(() => {
                                this.updatePlayerUI(e.target);
                            }, 1000);
                        },
                        onStateChange: (e) => {
                            const data = e.data;
                            if (data === YT.PlayerState.PLAYING) {
                                this.player.isTracking = true;
                                this.player.sessionStart = Date.now();
                                document.getElementById('p-status') &&
                                    (document.getElementById('p-status').textContent = '▶ Playing');
                                document.getElementById('p-status') &&
                                    (document.getElementById('p-status').style.color = '#4ade80');
                            } else if (data === YT.PlayerState.PAUSED) {
                                this.player.isTracking = false;
                                // Add the time since last track
                                if (this.player.sessionStart > 0) {
                                    const elapsed = (Date.now() - this.player.sessionStart) / 1000;
                                    this.player.sessionSeconds += elapsed;
                                    this.addWatchTime(elapsed);
                                    this.player.sessionStart = Date.now();
                                }
                                document.getElementById('p-status') &&
                                    (document.getElementById('p-status').textContent = '⏸ Paused');
                                document.getElementById('p-status') &&
                                    (document.getElementById('p-status').style.color = '#facc15');
                            } else if (data === YT.PlayerState.ENDED) {
                                this.player.isTracking = false;
                                if (this.player.sessionStart > 0) {
                                    const elapsed = (Date.now() - this.player.sessionStart) / 1000;
                                    this.player.sessionSeconds += elapsed;
                                    this.addWatchTime(elapsed);
                                    this.player.sessionStart = 0;
                                }
                                document.getElementById('p-status') &&
                                    (document.getElementById('p-status').textContent = '✓ Done');
                                document.getElementById('p-status') &&
                                    (document.getElementById('p-status').style.color = '#4ade80');
                                // Mark as complete
                                const v = this.data.videos.find(v => v.id === id);
                                if (v) {
                                    v.status = 'completed';
                                    v.progress = v.duration || 0;
                                    this.saveState();
                                }
                                // Auto-close after 3s
                                setTimeout(() => this.closePlayer(), 2500);
                            }
                        },
                        onError: (e) => {
                            console.warn('YouTube error:', e.data);
                            document.getElementById('p-status') &&
                                (document.getElementById('p-status').textContent = '⚠ Error');
                            document.getElementById('p-status') &&
                                (document.getElementById('p-status').style.color = '#ef4444');
                        }
                    }
                });

                // Store reference
                this.player.instance = player;
            },

            updatePlayerUI(player) {
                if (!player) return;
                try {
                    const currentTime = player.getCurrentTime();
                    const duration = player.getDuration();
                    // Update progress in video data
                    const id = this.player.currentVideoId;
                    if (id && currentTime > 0) {
                        const v = this.data.videos.find(v => v.id === id);
                        if (v) {
                            v.progress = currentTime;
                            v.duration = duration || v.duration;
                            v.status = 'in-progress';
                            v.lastWatched = Date.now();
                            // Save periodically but not too often
                            if (Math.floor(currentTime) % 5 === 0) {
                                this.saveState();
                            }
                        }
                    }

                    // Update session timer
                    let elapsed = this.player.sessionSeconds;
                    if (this.player.isTracking && this.player.sessionStart > 0) {
                        elapsed += (Date.now() - this.player.sessionStart) / 1000;
                    }
                    const mins = Math.floor(elapsed / 60);
                    const secs = Math.floor(elapsed % 60);
                    const sessionEl = document.getElementById('p-session');
                    if (sessionEl) {
                        sessionEl.textContent = `⏱ ${mins}:${secs.toString().padStart(2, '0')}`;
                    }

                    // Daily progress
                    const prog = this.getDailyProgress();
                    const dailyEl = document.getElementById('p-daily');
                    if (dailyEl) {
                        const watchedMin = Math.floor(prog.watchedSec / 60);
                        const goalMin = this.daily.dailyGoal;
                        dailyEl.textContent = `📚 ${watchedMin}m / ${goalMin}m`;
                        if (prog.isComplete) {
                            dailyEl.textContent = `✅ ${watchedMin}m / ${goalMin}m — Goal met! 🎉`;
                        }
                    }

                    // Update video progress in the card (if visible)
                    if (id) {
                        const fillEl = document.querySelector(`.video-card[data-id="${id}"] .progress-bar .fill`);
                        if (fillEl && duration > 0) {
                            const pct = Math.min((currentTime / duration) * 100, 100);
                            fillEl.style.width = pct + '%';
                        }
                    }
                } catch (_) { /* ignore */ }
            },

            toggleFullScreen() {
                const elem = document.getElementById('fs-container');
                if (!elem) return;
                if (!document.fullscreenElement) {
                    if (elem.requestFullscreen) elem.requestFullscreen();
                    else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                    else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                }
            },

            closePlayer() {
                // Stop tracking
                if (this.player.timerInterval) {
                    clearInterval(this.player.timerInterval);
                    this.player.timerInterval = null;
                }
                if (this.player.isTracking && this.player.sessionStart > 0) {
                    const elapsed = (Date.now() - this.player.sessionStart) / 1000;
                    if (elapsed > 0) {
                        this.player.sessionSeconds += elapsed;
                        this.addWatchTime(elapsed);
                    }
                }
                this.player.isTracking = false;
                this.player.sessionStart = 0;

                // Destroy player
                if (this.player.instance && typeof this.player.instance.destroy === 'function') {
                    try { this.player.instance.destroy(); } catch (_) {}
                }
                this.player.instance = null;
                this.player.currentVideoId = null;

                // Remove overlay
                const ov = document.querySelector('.player-overlay');
                if (ov) ov.remove();

                // Exit fullscreen if active
                if (document.fullscreenElement) {
                    if (document.exitFullscreen) document.exitFullscreen();
                }

                this.saveState();
                this.render();
            },

            // ─── EXPORT / IMPORT ───
            exportData() {
                const data = 'data:text/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(this.data.videos));
                const a = document.createElement('a');
                a.href = data;
                a.download = 'study_backup.json';
                document.body.appendChild(a);
                a.click();
                a.remove();
            },

            importData(el) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        this.data.videos = JSON.parse(e.target.result);
                        this.saveState();
                    } catch (_) { alert('Invalid file.'); }
                };
                reader.readAsText(el.files[0]);
                el.value = '';
            },

            // ─── RENDER ─────────────────────────────────────────────────
            render() {
                const isHome = this.data.tab === 'home';
                let list = this.data.videos;

                // Filter by category
                if (!isHome) {
                    list = list.filter(v => v.category === this.data.tab);
                } else {
                    // Home: show in-progress first
                    list = list.filter(v => v.status === 'in-progress').sort((a, b) => b.lastWatched - a.lastWatched);
                }

                // Sort for category view
                if (!isHome) {
                    list.sort((a, b) => {
                        const order = { 'in-progress': 0, 'new': 1, 'completed': 2 };
                        if (order[a.status] !== order[b.status]) return order[a.status] - order[b.status];
                        if (a.status === 'in-progress') return b.lastWatched - a.lastWatched;
                        return b.added - a.added;
                    });
                }

                // ── Build HTML ──
                let html = `
                    <nav class="navbar">
                        <div class="logo"><i data-lucide="book-open" width="20"></i> StudyStream</div>
                        <button class="btn-add" onclick="app.toggleModal(true)"><i data-lucide="plus" width="16"></i> Add</button>
                    </nav>
                    <div class="container fade-in">
                `;

                // ── Home: Daily Progress ──
                if (isHome) {
                    const prog = this.getDailyProgress();
                    const isComplete = prog.isComplete;
                    const watchedMin = Math.floor(prog.watchedSec / 60);
                    const goalMin = this.daily.dailyGoal;
                    const pct = Math.min(prog.percent, 100);
                    const streak = this.daily.streak;

                    // Motivational message
                    let msg = 'Start your study session! 🚀';
                    if (isComplete) {
                        const msgs = [
                            'Goal crushed! 🎉 You\'re unstoppable!',
                            'Amazing focus! 🔥 Keep the streak alive!',
                            'You did it! 💪 One step closer to mastery!',
                            'Legendary! ⭐ Daily goal complete!',
                        ];
                        msg = msgs[Math.floor(Math.random() * msgs.length)];
                    } else if (watchedMin > 0) {
                        const remain = goalMin - watchedMin;
                        if (remain <= 5) msg = `Almost there! Just ${remain}m more! 🔥`;
                        else if (remain <= 15) msg = `Great start! ${remain}m to go! 💪`;
                        else msg = `Keep going! ${remain}m remaining today. 📖`;
                    } else if (streak > 0) {
                        msg = `You're on a ${streak}-day streak! Let's go! 🔥`;
                    }

                    html += `
                        <div class="daily-card">
                            <div class="daily-left">
                                <div class="streak">
                                    ${streak > 0 ? '🔥' : '💪'} ${streak} day${streak !== 1 ? 's' : ''}
                                    <span>streak</span>
                                </div>
                                <div class="time-label">
                                    Today: <strong>${watchedMin}m</strong> / ${goalMin}m
                                    ${isComplete ? ' ✅' : ''}
                                </div>
                            </div>
                            <div class="daily-mid">
                                <div class="progress-track">
                                    <div class="fill" style="width:${pct}%;${isComplete ? 'background:linear-gradient(90deg,#22c55e,#4ade80);' : ''}"></div>
                                </div>
                                <div class="progress-stats">
                                    <span>${Math.round(pct)}%</span>
                                    <span>${isComplete ? '🎯 Done!' : `${Math.max(0, goalMin - watchedMin)}m left`}</span>
                                </div>
                            </div>
                            <div class="daily-right">
                                <div class="msg">${msg}</div>
                                <button class="btn-goal" onclick="app.toggleGoalModal(true)">Set Goal</button>
                            </div>
                        </div>
                    `;

                    // ── Quick Resume ──
                    const next = this.getNextVideo();
                    if (next) {
                        html += `
                            <div style="margin-bottom:20px;">
                                <button onclick="app.playVideo('${next.id}')" style="width:100%; padding:12px; background:var(--primary); color:#fff; border:none; border-radius:var(--radius); font-weight:600; font-size:0.95rem; display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; transition:transform 0.15s;">
                                    <i data-lucide="play-circle" width="20"></i> Resume Study Session
                                </button>
                            </div>
                        `;
                    }
                }

                // ── Dashboard Grid (always show) ──
                if (isHome) {
                    html += `<div class="section-title"><i data-lucide="layout-dashboard" width="18"></i> Dashboard</div>`;
                    html += `<div class="dash-grid">`;
                    const cats = ['physics', 'chemistry', 'biology'];
                    const icons = { physics: 'atom', chemistry: 'flask-conical', biology: 'dna' };
                    cats.forEach(c => {
                        const total = this.data.videos.filter(v => v.category === c).length;
                        const left = this.data.videos.filter(v => v.category === c && v.status !== 'completed').length;
                        const pct = total > 0 ? Math.round(((total - left) / total) * 100) : 0;
                        html += `
                            <div class="dash-card" onclick="app.setTab('${c}')">
                                <i data-lucide="${icons[c]}" style="color:var(--primary);"></i>
                                <h3>${c}</h3>
                                <small>${left} left · ${pct}% done</small>
                                <div class="count-badge">${total}</div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }

                // ── Video List ──
                if (!isHome) {
                    const catName = this.data.tab.charAt(0).toUpperCase() + this.data.tab.slice(1);
                    const total = this.data.videos.filter(v => v.category === this.data.tab).length;
                    const left = this.data.videos.filter(v => v.category === this.data.tab && v.status !== 'completed')
                    .length;
                    html += `
                        <div class="flex-between" style="margin-bottom:16px;">
                            <h2 style="text-transform:capitalize;">${catName}</h2>
                            <span style="color:var(--text-sec);font-size:0.85rem;">${left} remaining · ${total} total</span>
                        </div>
                    `;
                } else {
                    html += `<div class="section-title" style="margin-top:8px;"><i data-lucide="clock" width="18"></i> Continue Watching</div>`;
                }

                if (list.length === 0) {
                    const msg = isHome ? 'No videos in progress. Add some lectures to get started!' :
                        `No videos in ${this.data.tab} yet.`;
                    html += `<div class="empty-state"><i data-lucide="inbox" width="28" style="display:block;margin:0 auto 8px;color:var(--text-sec);"></i>${msg}</div>`;
                } else {
                    list.forEach(v => {
                        const pct = v.duration ? Math.min((v.progress / v.duration) * 100, 100) : 0;
                        const statusLabel = v.status === 'completed' ? 'Completed' :
                            v.status === 'in-progress' ? 'In Progress' : 'New';
                        const dotClass = v.status === 'completed' ? 'completed' :
                            v.status === 'in-progress' ? 'in-progress' : 'new';
                        const isComplete = v.status === 'completed';
                        html += `
                            <div class="video-card ${isComplete ? 'completed' : ''}" data-id="${v.id}">
                                <div class="thumb-box" onclick="app.playVideo('${v.id}')">
                                    <img src="https://img.youtube.com/vi/${v.id}/hqdefault.jpg" alt="thumbnail" loading="lazy">
                                    <div class="play-icon"><i data-lucide="play" width="18" fill="currentColor"></i></div>
                                </div>
                                <div class="progress-bar"><div class="fill" style="width:${isComplete ? 100 : pct}%"></div></div>
                                <div class="card-meta">
                                    <div class="v-info">
                                        <span class="v-cat">${v.category}</span>
                                        <h3>${this.getVideoTitle(v.id)}</h3>
                                        <div class="v-status">
                                            <span class="dot ${dotClass}"></span>
                                            ${statusLabel} ${v.duration ? `· ${Math.floor(v.progress)}s / ${Math.floor(v.duration)}s` : ''}
                                        </div>
                                    </div>
                                    <div class="card-actions">
                                        ${!isComplete ? `<button class="btn-resume" onclick="app.playVideo('${v.id}')">Resume</button>` : ''}
                                        <button onclick="app.deleteVideo('${v.id}')" title="Delete"><i data-lucide="trash-2" width="16"></i></button>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }

                // ── Export / Import ──
                if (isHome) {
                    html += `
                        <div style="margin-top:32px; border-top:1px solid #e2e8f0; padding-top:20px; display:flex; flex-wrap:wrap; gap:10px; justify-content:space-between;">
                            <button onclick="app.exportData()" style="padding:8px 18px; background:#e2e8f0; border:none; border-radius:8px; font-size:0.8rem; cursor:pointer; color:var(--text-main);">📤 Export Backup</button>
                            <label style="padding:8px 18px; background:#e2e8f0; border:none; border-radius:8px; font-size:0.8rem; cursor:pointer; color:var(--text-main);">
                                📥 Import Backup
                                <input type="file" hidden accept=".json" onchange="app.importData(this)">
                            </label>
                        </div>
                    `;
                }

                html += `</div>`;

                // ── Modals ──
                if (this.data.modalOpen) {
                    html += `
                        <div class="modal-wrap" onclick="if(event.target===this) app.toggleModal(false)">
                            <div class="modal-box fade-in">
                                <h3>📥 Add Videos</h3>
                                <div class="cat-picker">
                                    ${['physics','chemistry','biology'].map(c =>
                                        `<button class="${this.data.addCat === c ? 'active' : ''}" onclick="app.setCat('${c}')">${c}</button>`
                                    ).join('')}
                                </div>
                                <textarea id="linkBox" class="input-area" placeholder="Paste YouTube links (one per line)…"></textarea>
                                <div class="modal-actions">
                                    <button class="btn-primary" onclick="app.addVideos()">Import</button>
                                    <button class="btn-secondary" onclick="app.toggleModal(false)">Cancel</button>
                                </div>
                            </div>
                        </div>
                    `;
                }

                if (this.data.goalModal) {
                    html += `
                        <div class="modal-wrap" onclick="if(event.target===this) app.toggleGoalModal(false)">
                            <div class="modal-box fade-in">
                                <h3>🎯 Set Daily Goal</h3>
                                <p style="color:var(--text-sec);font-size:0.9rem;margin:4px 0 12px;">How many minutes do you want to study each day?</p>
                                <div style="display:flex;align-items:center;gap:12px;margin:8px 0 16px;">
                                    <input type="range" min="5" max="180" step="5" value="${this.goalInput}" 
                                        oninput="document.getElementById('goalDisplay').textContent=this.value+'m'; app.goalInput=parseInt(this.value)"
                                        style="flex:1;accent-color:var(--primary);">
                                    <span id="goalDisplay" style="font-size:1.2rem;font-weight:700;min-width:50px;">${this.goalInput}m</span>
                                </div>
                                <div class="modal-actions">
                                    <button class="btn-primary" onclick="app.setGoal(app.goalInput)">Set Goal</button>
                                    <button class="btn-secondary" onclick="app.toggleGoalModal(false)">Cancel</button>
                                </div>
                            </div>
                        </div>
                    `;
                }

                // ── Bottom Nav ──
                html += `
                    <div class="btm-nav">
                        ${['home','physics','chemistry','biology'].map(t => {
                            const icon = t === 'home' ? 'home' : t === 'physics' ? 'atom' : t === 'chemistry' ? 'flask-conical' : 'dna';
                            const isActive = this.data.tab === t;
                            const left = t !== 'home' ? this.data.videos.filter(v => v.category === t && v.status !== 'completed').length : 0;
                            return `
                                <button class="btm-btn ${isActive ? 'active' : ''}" onclick="app.setTab('${t}')">
                                    <i data-lucide="${icon}" width="20"></i>
                                    <span style="text-transform:capitalize">${t === 'home' ? 'Home' : t}</span>
                                    ${left > 0 && t !== 'home' ? `<span style="font-size:0.55rem;background:var(--primary);color:#fff;border-radius:99px;padding:0 6px;line-height:14px;">${left}</span>` : ''}
                                </button>
                            `;
                        }).join('')}
                    </div>
                `;

                document.getElementById('app').innerHTML = html;
                lucide.createIcons();

                // ── Auto-focus link box if modal open ──
                if (this.data.modalOpen) {
                    setTimeout(() => {
                        const box = document.getElementById('linkBox');
                        if (box) box.focus();
                    }, 100);
                }
            }
        };

        // ─── BOOT ───
        window.onload = () => {
            // Wait for YouTube API to be ready
            if (typeof YT !== 'undefined' && YT.loaded) {
                app.init();
            } else {
                // If API not loaded, wait for it
                const checkYT = setInterval(() => {
                    if (typeof YT !== 'undefined' && YT.loaded) {
                        clearInterval(checkYT);
                        app.init();
                    }
                }, 200);
                // Fallback: init after 3s anyway
                setTimeout(() => {
                    if (!app.daily.todayDate) {
                        app.init();
                    }
                }, 3000);
            }

            // Service worker
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/study-stream/sw.js')
                        .then(reg => console.log('✅ PWA Registered'))
                        .catch(err => console.log('❌ SW Error', err));
                });
            }
        };

        // ─── Expose to global ───
        window.app = app;
    </script>
</body>
  </html>
