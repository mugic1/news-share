<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PeerDrop Ultra Dashboard</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0b0f19" />
  <link rel="stylesheet" href="style.css?v=4.0" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1>⚡ PeerDrop Ultra</h1>
      <p>Super‑fast P2P file sharing</p>
    </div>

    <div class="dashboard-layout">
      
      <div class="panel-left">
        <div class="card">
          <h2>Your ID</h2>
          <div id="peerId" class="peer-box">Generating…</div>
          <div class="qr-zone"><canvas id="qrCanvas"></canvas></div>
        </div>

        <div class="card">
          <h2>Connect</h2>
          <input type="text" id="peerInput" placeholder="Enter Peer ID" />
          <div class="btns">
            <button id="connectBtn" class="btn-main">Connect</button>
            <button id="scanBtn" class="btn-sub">Scan QR</button>
          </div>
          <div id="reader"></div>
        </div>
      </div>

      <div class="panel-right">
        <div class="card file-card">
          <h2>Files <span id="speedDisplay">⚡ 0.0 MB/s</span></h2>
          <div id="dropzone">📥 Drop Files Here or Tap</div>
          <input type="file" id="fileInput" multiple style="display:none;" />
          <div class="btns">
            <button id="sendFilesBtn" class="btn-main">Send Files</button>
            <button id="downloadAllBtn" class="btn-sub">Download ZIP</button>
          </div>
          <div id="transfers" class="scroll-container"></div>
          <div id="downloads" class="scroll-container"></div>
        </div>

        <div class="card chat-card">
          <div class="chat-header">
            <div id="status" class="status-offline">Disconnected</div>
          </div>
          <div id="messages"></div>
          <div class="chat-box">
            <input type="text" id="messageInput" placeholder="Type message..." />
            <button id="sendBtn">Send</button>
          </div>
        </div>
      </div>

    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
